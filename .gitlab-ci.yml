variables:
  NODE_VERSION: "18"

stages:
  - deploy

deploy_to_s3_and_repo:
  stage: deploy
  image: node:${NODE_VERSION}
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^deploy:/ && $CI_COMMIT_REF_NAME == "main"
      when: on_success
    - if: $CI_COMMIT_TAG && $CI_COMMIT_REF_NAME == "main"
      when: on_success
  interruptible: true
  resource_group: deploy
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
      - .npm/
    policy: pull-push
  before_script:
    # AWS CLI 설치 (캐시 문제로 매번 설치)
    - apt-get update -qq && apt-get install -y -qq git awscli
    - git config --global user.email "${GITLAB_USER_EMAIL}"
    - git config --global user.name "${GITLAB_USER_NAME}"
  script:
    - |
      set -e
      
      # 배포 가능한 타겟 사전 확인
      GIT_DEPLOY_AVAILABLE=false
      S3_DEPLOY_AVAILABLE=false
      
      # Git 배포 확인 (두 변수 모두 필요)
      if [ -n "$PROJECT_ACCESS_TOKEN" ] && [ -n "$TARGET_REPO_URL" ]; then
        GIT_DEPLOY_AVAILABLE=true
        echo "✅ Git deployment variables available"
      else
        echo "⚠️  Git deployment skipped (PROJECT_ACCESS_TOKEN or TARGET_REPO_URL not set)"
      fi
      
      # S3 배포 확인 (S3_FOLDER만 필요)
      if [ -n "$S3_FOLDER" ]; then
        S3_DEPLOY_AVAILABLE=true
        echo "✅ S3 deployment variables available"
      else
        echo "⚠️  S3 deployment skipped (S3_FOLDER not set)"
      fi
      
      # 배포 가능한 타겟이 없으면 빌드 없이 종료
      if [ "$GIT_DEPLOY_AVAILABLE" = false ] && [ "$S3_DEPLOY_AVAILABLE" = false ]; then
        echo "❌ No deployment targets available. Skipping build and deployment."
        echo "Please configure required environment variables:"
        echo "  - For Git deployment: PROJECT_ACCESS_TOKEN AND TARGET_REPO_URL"
        echo "  - For S3 deployment: S3_FOLDER"
        exit 1
      fi
      
      # node_modules 캐시 확인
      if [ -d "node_modules" ] && [ -f "node_modules/.cache-valid" ]; then
        echo "📦 Using cached node_modules"
        # package-lock.json 변경 확인
        if [ package-lock.json -nt node_modules/.cache-valid ]; then
          echo "📦 package-lock.json changed, reinstalling dependencies..."
          npm ci --cache .npm --prefer-offline
          touch node_modules/.cache-valid
        fi
      else
        echo "📦 Installing dependencies..."
        npm ci --cache .npm --prefer-offline
        touch node_modules/.cache-valid
      fi
      
      echo "Building project..."
      npm run build
      
      # 빌드 검증
      if [ ! -d "build" ] || [ -z "$(ls -A build)" ]; then
        echo "Build directory is empty or missing"
        exit 1
      fi
      
      echo "Starting conditional deployment..."
      
      # Git 배포 (백그라운드)
      if [ "$GIT_DEPLOY_AVAILABLE" = true ]; then
        (
          echo "Pushing to target repository..."
          if [ -n "$CI_COMMIT_TAG" ]; then
            DEPLOY_MESSAGE="Deploy tag: $CI_COMMIT_TAG"
          else
            DEPLOY_MESSAGE=$(echo "$CI_COMMIT_MESSAGE" | sed 's/^deploy://')
          fi
          git clone https://gitlab-ci-token:${PROJECT_ACCESS_TOKEN}@${TARGET_REPO_URL} target_repo
          cd target_repo
          cp -r ../build/* .
          git add .
          git commit -m "$DEPLOY_MESSAGE" || echo "No changes to commit"
          git push origin main
          echo "Git deployment completed"
        ) &
        GIT_PID=$!
      fi
      
      # S3 배포 (백그라운드)
      if [ "$S3_DEPLOY_AVAILABLE" = true ]; then
        (
          echo "Uploading to S3..."
          # S3_BUCKET_NAME이 없으면 기본값 사용 또는 에러 처리
          if [ -z "$S3_BUCKET_NAME" ]; then
            echo "❌ S3_BUCKET_NAME is required for S3 deployment"
            exit 1
          fi
          aws s3 sync build/ s3://${S3_BUCKET_NAME}/${S3_FOLDER}/ --delete
          echo "S3 upload completed"
      
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            echo "Invalidating CloudFront cache..."
            aws cloudfront create-invalidation --distribution-id ${CLOUDFRONT_DISTRIBUTION_ID} --paths "/${S3_FOLDER}/*"
            echo "CloudFront invalidation completed"
          else
            echo "⚠️  CloudFront invalidation skipped (CLOUDFRONT_DISTRIBUTION_ID not set)"
          fi
        ) &
        S3_PID=$!
      fi
      
      # 실행된 작업들 완료 대기
      GIT_EXIT=0
      S3_EXIT=0
      
      if [ "$GIT_DEPLOY_AVAILABLE" = true ]; then
        wait $GIT_PID
        GIT_EXIT=$?
      fi
      
      if [ "$S3_DEPLOY_AVAILABLE" = true ]; then
        wait $S3_PID
        S3_EXIT=$?
      fi
      
      # 결과 출력
      if [ "$GIT_DEPLOY_AVAILABLE" = true ]; then
        if [ $GIT_EXIT -eq 0 ]; then
          echo "✅ Git deployment succeeded"
        else
          echo "❌ Git deployment failed"
        fi
      fi
      
      if [ "$S3_DEPLOY_AVAILABLE" = true ]; then
        if [ $S3_EXIT -eq 0 ]; then
          echo "✅ S3 deployment succeeded"
        else
          echo "❌ S3 deployment failed"
        fi
      fi
      
      # 실행된 배포 중 최소 하나가 성공하면 전체 성공으로 처리
      if ([ "$GIT_DEPLOY_AVAILABLE" = false ] || [ $GIT_EXIT -eq 0 ]) && ([ "$S3_DEPLOY_AVAILABLE" = false ] || [ $S3_EXIT -eq 0 ]); then
        echo "🎉 Deployment completed successfully"
        exit 0
      else
        echo "💥 One or more deployments failed"
        exit 1
      fi

  artifacts:
    paths:
      - build/
    expire_in: 1 day
